# Pre-commit hooks for docsense.
#
# Install once after cloning:
#   pre-commit install                      # commit-stage hooks (ruff, mypy)
#   pre-commit install --hook-type pre-push # push-stage hook (pytest)
#
# Local hooks invoke the venv's binaries directly via .venv/bin/... rather
# than relying on PATH order. This makes them deterministic regardless of
# whether the user has the venv activated, and avoids silently picking up
# mismatched versions from globally-installed Python tooling (e.g.,
# miniconda's older ruff). The venv path is repo-relative; the project
# convention is `python -m venv .venv` from the repo root.

repos:
  # Generic hygiene checks (commit stage).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Lint, format, and type-check on commit; full PR-CI-parity test on push.
  # The test suite is too slow for every commit but cheap enough for every
  # push, and pre-push catches the bulk of CI failures locally before they
  # ever reach the PR.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest
        name: pytest (PR-CI parity)
        entry: .venv/bin/pytest -m "not slow and not gpu and not integration"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
