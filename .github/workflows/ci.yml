name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Single Python version (3.12) across all jobs. The previous matrix on
# 3.11 + 3.12 was theatre — the codebase doesn't use any version-sensitive
# stdlib or syntax, so the second run never produced a different signal.
# pyproject.toml's requires-python is pinned to >=3.12 to match.
env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        # Pinned to match the version in pyproject.toml's dev extras to
        # eliminate local-vs-CI lint drift.
        run: pip install ruff==0.15.8
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        # Mypy needs the actual deps installed to resolve cross-package types
        # (e.g., numpy.typing). Editable install matches the dev environment.
        run: pip install -e ".[dev]"
      - name: Type check
        run: mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        # --cov-fail-under=90 enforces the floor in CI only. The natural
        # state is ~98%; the gate sits 8 points lower so adding a feature
        # with reasonable tests doesn't trip it. Calibration intent: catch
        # egregious coverage slips, not nudge into test theater.
        run: pytest -m "not slow and not gpu and not integration" --cov=docsense --cov-report=term-missing --cov-fail-under=90
