# Header-chunking ablation.
#
# Demonstrates the YAML config plumbing with non-default knobs. Tuned
# for header-based chunks (which are larger and fewer-per-doc than the
# recursive default): higher rerank candidate count to give the
# cross-encoder enough material despite the lower chunks-per-doc
# density, and a more even RRF weighting since header text matches
# keyword (BM25) queries well.
#
# Usage:
#   python scripts/run_bakeoff.py --config configs/header-strategy.yaml \
#       --strategies header --rerank
#
# (chunking.strategy is set here for documentation; the bakeoff loads
# pre-built indices selected via --strategies, so the config's chunking
# field is most useful for build_index.py and other indexing-time
# consumers.)

chunking:
  strategy: header
  chunk_size: 1024           # larger budget for header sections
  chunk_overlap: 64

retrieval:
  top_k: 5
  rerank_candidates: 30      # higher than default's 20 — fewer chunks
                             # per doc means a wider candidate pool helps
                             # the cross-encoder pick across more docs
  dense_weight: 0.5          # more even split since header text matches
  sparse_weight: 0.5         # BM25 / keyword queries strongly

reranking:
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  batch_size: 32
